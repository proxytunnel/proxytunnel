name: Build for Windows (Cygwin)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: cygwin/cygwin-install-action@v6.1
      with:
        packages: gcc-core
    - name: test
      shell: bash {0}
      run: gcc --version && cc --version && make --version && ld --version
    - name: Build
      shell: bash {0}
      run: make && make docs
